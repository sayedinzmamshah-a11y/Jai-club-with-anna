<!DOCTYPE html>
<html>
<head>
  <title>Game Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      margin: 0;
    }

    .box {
      background: #222;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn1 { background: green; color: white; }
    .btn2 { background: orange; color: white; }
  </style>
</head>

<body>

  <h1>🔥 Game Dashboard Demo</h1>

  <div class="box">
    <h2>👤 User</h2>
    <p>Name: Jai Club</p>
    <p>Wallet: ₹100</p>
  </div>

  <div class="box">
    <h2>🎮 Games</h2>
    <button class="btn1">Aviator Demo</button>
    <button class="btn2">Wingo Spin</button>
  </div>

  <div class="box">
    <h2>💰 Transactions</h2>
    <p>+100 Coins Added</p>
  </div>

</body>
</html>
